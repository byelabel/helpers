name: publish

on:
  push:
    tags:
      - 'utils-v*'
      - 'react-v*'
  workflow_dispatch:
    inputs:
      package:
        description: Package to publish
        type: choice
        required: true
        options:
          - utils
          - react

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          scope: '@byelabel'
          cache: pnpm

      - run: pnpm install
      - run: pnpm -r build
      - run: pnpm -r test

      - name: Publish @byelabel/utils
        if: startsWith(github.ref, 'refs/tags/utils-v') || (github.event_name == 'workflow_dispatch' && inputs.package == 'utils')
        working-directory: packages/utils
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @byelabel/react
        if: startsWith(github.ref, 'refs/tags/react-v') || (github.event_name == 'workflow_dispatch' && inputs.package == 'react')
        working-directory: packages/react
        run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
